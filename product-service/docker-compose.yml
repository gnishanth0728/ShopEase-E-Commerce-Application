services:
  mysql:
    image: mysql:8.4
    container_name: ecommerce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/ecommerce_init.sql:/docker-entrypoint-initdb.d/ecommerce_init.sql
    restart: unless-stopped

volumes:
  mysql-data:
