services:
  postgres:
    image: postgres:17
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/auth_init.sql:/docker-entrypoint-initdb.d/auth_init.sql
    restart: unless-stopped

volumes:
  postgres-data:
