spring.application.name=order-service

server.address=0.0.0.0
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3308/ecommerce_order?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=mysecretkeymysecretkeymysecretkey12345

cart.service.url=${CART_SERVICE_URL:http://localhost:8082/api/cart}
payment.service.url=${PAYMENT_SERVICE_URL:http://localhost:8084/api/payments/process}
shipping.service.url=${SHIPPING_SERVICE_URL:http://localhost:8085/api/shipping/calculate}
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8081/api/products}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

kafka.topic.order-placed=order-events

logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
